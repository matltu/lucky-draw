<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微软亚太工会 - Teams Fair 微软亚太工会趣味问答挑战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d7e9f7 100%);
    overflow: hidden;
    position: relative;
  }

  /* ---- floating cartoon decorations ---- */
  .bubble {
    position: fixed;
    font-size: 2.2rem;
    opacity: .45;
    animation: floatUpMove linear forwards;
    pointer-events: none;
    z-index: 0;
  }
  .bubble.bubble-hover {
    animation-play-state: paused;
    opacity: .75;
  }
  .bubble-inner {
    display: inline-block;
    animation: floatUpRotate var(--rot-dur) linear infinite;
  }

  @keyframes floatUpMove {
    0%   { transform: translateY(110vh); }
    100% { transform: translateY(-10vh); }
  }
  @keyframes floatUpRotate {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* ---- clouds ---- */
  .cloud {
    position: fixed;
    width: 160px; height: 60px;
    background: rgba(255,255,255,.55);
    border-radius: 60px;
    pointer-events: none;
    z-index: 0;
    animation: driftCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,.55);
    border-radius: 50%;
  }
  .cloud::before { width: 70px; height: 70px; top: -30px; left: 25px; }
  .cloud::after  { width: 90px; height: 90px; top: -40px; left: 55px; }
  @keyframes driftCloud {
    0%   { transform: translateX(-200px); }
    100% { transform: translateX(110vw); }
  }

  /* ---- header ---- */
  .header {
    position: relative;
    z-index: 1;
    margin-top: clamp(16px, 4vw, 36px);
    text-align: center;
    padding: 0 12px;
  }
  .header h1 {
    font-size: clamp(1.4rem, 5vw, 2.6rem);
    font-weight: 800;
    background: linear-gradient(90deg, #0078d4, #50e6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: clamp(2px, 1vw, 6px);
    text-shadow: none;
  }
  .header .sub {
    font-size: clamp(0.75rem, 2.5vw, 1rem);
    color: #555;
    margin-top: 6px;
    letter-spacing: clamp(1px, 0.8vw, 3px);
  }

  /* ---- question card ---- */
  .card-wrapper {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 24px;
  }
  .card {
    width: min(720px, calc(100vw - 48px));
    min-height: clamp(220px, 40vh, 520px);
    background: rgba(255,255,255,.88);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,120,212,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(20px, 4vw, 40px) clamp(16px, 4vw, 48px);
    transition: box-shadow .4s, transform .4s, background .4s;
    text-align: center;
  }
  .card.clickable {
    cursor: pointer;
  }
  .card.highlight {
    background: rgba(255,255,255,.97);
    box-shadow: 0 0 0 6px #0078d4, 0 0 60px rgba(0,120,212,.35);
    transform: scale(1.04);
    animation: pulse 1s ease-in-out 3;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 6px #0078d4, 0 0 60px rgba(0,120,212,.35); }
    50%      { box-shadow: 0 0 0 10px #50e6ff, 0 0 90px rgba(80,230,255,.45); }
  }
  .card .q-number {
    font-size: clamp(0.75rem, 2vw, 1rem);
    color: #0078d4;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .card .q-text {
    font-size: clamp(1rem, 3.5vw, 1.45rem);
    font-weight: 700;
    color: #222;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .card .q-options {
    font-size: clamp(0.85rem, 2.5vw, 1.15rem);
    color: #444;
    line-height: 1.9;
  }
  .card .ready-text {
    font-size: clamp(1rem, 4vw, 1.6rem);
    color: #999;
    letter-spacing: clamp(1px, 1vw, 4px);
  }


  /* ---- answer area ---- */
  .answer-area {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .answer-area .ans-btn {
    width: 90%;
    padding: clamp(8px, 2vw, 10px) clamp(10px, 2vw, 16px);
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    font-weight: 700;
    border: 2px solid #0078d4;
    border-radius: 12px;
    background: #fff;
    color: #0078d4;
    cursor: pointer;
    transition: all .2s;
    display: grid;
    grid-template-columns: 2em 1fr;
    align-items: center;
    text-align: left;
  }
  .answer-area .ans-btn .opt-label {
    text-align: left;
  }
  .answer-area .ans-btn .opt-text {
    text-align: center;
  }
  .answer-area .ans-btn:hover {
    background: #e8f4fd;
    transform: translateY(-1px);
  }
  .rolling-opt {
    cursor: default !important;
    pointer-events: none;
  }
  .rolling-opt:hover {
    background: #fff !important;
    transform: none !important;
  }
  .answer-area .ans-btn.correct {
    background: #2ecc71;
    color: #fff;
    border-color: #2ecc71;
    animation: correctPop .4s ease;
  }
  .answer-area .ans-btn.wrong {
    background: #e74c3c;
    color: #fff;
    border-color: #e74c3c;
    animation: shake .4s ease;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .answer-area .ans-input {
    padding: 10px 20px;
    font-size: 1.1rem;
    border: 2px solid #0078d4;
    border-radius: 12px;
    outline: none;
    width: 280px;
    text-align: center;
  }
  .answer-area .ans-submit {
    padding: 10px 24px;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: #0078d4;
    color: #fff;
    cursor: pointer;
  }
  .answer-result {
    margin-top: 14px;
    font-size: clamp(0.9rem, 2.5vw, 1.2rem);
    font-weight: 700;
    min-height: 1.5em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .answer-result.correct { color: #2ecc71; }
  .answer-result.wrong { color: #e74c3c; }
  .continue-btn {
    padding: 5px 16px;
    font-size: 0.95rem;
    font-weight: 700;
    border: 2px solid #0078d4;
    border-radius: 10px;
    background: #fff;
    color: #0078d4;
    cursor: pointer;
    transition: all .2s;
  }
  .continue-btn:hover {
    background: #e8f4fd;
    transform: translateY(-1px);
  }

  /* ---- countdown timer ---- */
  .circle-countdown {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .circle-countdown-ring {
    position: relative;
    width: 140px;
    height: 140px;
  }
  .circle-countdown-ring svg {
    transform: rotate(-90deg);
    width: 140px;
    height: 140px;
  }
  .circle-countdown-ring .ring-bg {
    fill: none;
    stroke: #e0e0e0;
    stroke-width: 8;
  }
  .circle-countdown-ring .ring-fg {
    fill: none;
    stroke: url(#circleGrad);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 408;
    stroke-dashoffset: 0;
    transition: none;
  }
  .circle-countdown-ring .ring-fg.animate {
    animation: circleCountdown 2s linear forwards;
  }
  @keyframes circleCountdown {
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: 408; }
  }
  .circle-countdown-number {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3.5rem;
    font-weight: 900;
    background: linear-gradient(135deg, #0078d4, #50e6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .countdown-sub {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: #888;
    margin-top: 4px;
    letter-spacing: 2px;
  }
  .ready-go-text {
    font-size: clamp(3rem, 12vw, 6rem);
    font-weight: 900;
    background: linear-gradient(135deg, #f39c12, #e74c3c, #ff6f61);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: readyGoPop 0.5s ease-out;
    text-align: center;
    line-height: 1.2;
  }
  @keyframes readyGoPop {
    0% { transform: scale(0.3); opacity: 0; }
    60% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  /* ---- completion page ---- */
  .completion-page {
    text-align: center;
    padding: 10px 0;
  }
  .completion-page .trophy {
    font-size: clamp(3rem, 12vw, 5rem);
    margin-bottom: 12px;
  }
  .completion-page .result-title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 800;
    background: linear-gradient(90deg, #0078d4, #50e6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .completion-page .result-subtitle {
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    font-weight: 700;
    color: #f39c12;
    letter-spacing: 4px;
    margin-bottom: 20px;
  }
  .completion-page .stat-row {
    display: flex;
    justify-content: center;
    gap: clamp(16px, 5vw, 40px);
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .completion-page .stat-item {
    text-align: center;
  }
  .completion-page .stat-value {
    font-size: clamp(1.8rem, 6vw, 2.8rem);
    font-weight: 900;
    color: #0078d4;
    line-height: 1.2;
  }
  .completion-page .stat-value.perfect {
    color: #2ecc71;
  }
  .completion-page .stat-label {
    font-size: clamp(0.75rem, 2vw, 0.95rem);
    color: #888;
    margin-top: 4px;
  }
  .completion-page .finish-time {
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    color: #555;
    margin-bottom: 8px;
  }
  .completion-page .since-timer {
    font-size: clamp(0.8rem, 2vw, 0.95rem);
    color: #999;
    margin-bottom: 12px;
  }
  .completion-page .claim-hint {
    font-size: clamp(0.75rem, 2vw, 0.9rem);
    color: #e74c3c;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .completion-page .restart-btn {
    display: inline-block;
    padding: 14px 48px;
    font-size: clamp(1rem, 3vw, 1.25rem);
    font-weight: 700;
    letter-spacing: 4px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #0078d4, #50e6ff);
    box-shadow: 0 6px 24px rgba(0,120,212,.35);
    transition: transform .2s, box-shadow .2s;
  }
  .completion-page .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(0,120,212,.45);
  }

  /* ---- stars ---- */
  .stars-bar {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: clamp(4px, 1.5vw, 8px);
    margin-bottom: 20px;
    padding: 0 12px;
  }
  .stars-bar .star {
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    opacity: 0.7;
    transition: opacity .4s, transform .4s;
    filter: grayscale(1);
  }
  .stars-bar .star.lit {
    opacity: 1;
    filter: grayscale(0);
    animation: starPop .5s ease;
  }
  @keyframes starPop {
    0% { transform: scale(0.5) rotate(-20deg); }
    60% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* flying star overlay */
  .flying-star {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 45rem;
    line-height: 1;
    transform-origin: center center;
    will-change: transform, opacity;
    opacity: 0;
  }

  .logo-options {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: clamp(12px, 4vw, 30px);
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .logo-options div {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .logo-options span {
    font-weight: 700;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: #0078d4;
  }
  .logo-options img {
    width: clamp(64px, 18vw, 120px);
    height: clamp(64px, 18vw, 120px);
    object-fit: contain;
    border-radius: 10px;
    border: 2px solid #eee;
    background: #fff;
    padding: 4px;
  }

  /* ---- button ---- */
  .btn-area {
    position: relative;
    z-index: 1;
    margin-bottom: 48px;
  }
  .btn {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 6px;
    padding: 16px 64px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #0078d4, #50e6ff);
    box-shadow: 0 6px 24px rgba(0,120,212,.35);
    transition: transform .2s, box-shadow .2s;
    outline: none;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(0,120,212,.45);
  }
  .btn:active {
    transform: translateY(1px);
  }
  .btn.stop {
    background: linear-gradient(135deg, #e74c3c, #f39c12);
    box-shadow: 0 6px 24px rgba(231,76,60,.35);
  }

  /* ---- mobile overrides ---- */
  @media (max-width: 480px) {
    body { overflow-y: auto; }
    .card { border-radius: 16px; }
    .card.highlight { transform: scale(1.02); }
    .bubble { font-size: 1.4rem; }
    .cloud { width: 80px; height: 30px; }
    .cloud::before { width: 36px; height: 36px; top: -16px; left: 12px; }
    .cloud::after  { width: 46px; height: 46px; top: -22px; left: 28px; }
  }

  /* ---- tablet overrides ---- */
  @media (min-width: 481px) and (max-width: 1024px) {
    .card { border-radius: 20px; }
  }

  /* ---- confetti canvas ---- */
  #confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>
<body>

<!-- decorative clouds -->
<div class="cloud" style="top:8%;  animation-duration:28s;"></div>
<div class="cloud" style="top:22%; animation-duration:36s; animation-delay:8s; width:120px; height:45px;"></div>
<div class="cloud" style="top:60%; animation-duration:42s; animation-delay:14s; width:140px; height:50px;"></div>

<!-- header -->
<div class="header">
  <h1>🎉 微软亚太工会 🎉</h1>
  <div class="sub">Teams Fair 微软亚太工会趣味问答挑战</div>
</div>

<!-- question card -->
<div class="card-wrapper">
  <div class="card clickable" id="card" onclick="handleCardClick()">
    <div>
      <div class="ready-text" id="readyText">点击开始抽题 🎯</div>
      <div id="qContent" style="display:none;">
        <div class="q-number" id="qNumber"></div>
        <div class="q-text" id="qText"></div>
        <div class="q-options" id="qOptions"></div>
        <div class="answer-area" id="answerArea" style="display:none;"></div>
        <div class="answer-result" id="answerResult"></div>
      </div>
    </div>
  </div>
</div>

<!-- stars -->
<div class="stars-bar" id="starsBar"></div>

<button id="mainBtn" style="display:none;"></button>

<!-- confetti -->
<canvas id="confetti"></canvas>

<script>
// ===== Config =====
const TOTAL_QUESTIONS = 9; // 每轮回答的题目数量（不超过题库总数）

// ===== Questions data =====
const questions = [
  {
    q: "微软亚太工会现有几位工会委员？",
    opts: ["7位", "5位", "6位"],
    answer: "5位"
  },
  {
    q: "以下哪个组合能最完整代表工会最近一年内的节日慰问？",
    opts: ["春节 + 中秋", "五一 + 春节", "春节 + 五一 + 中秋"],
    answer: "春节 + 五一 + 中秋"
  },
  {
    q: "微软亚太工会 Logo 下方的字是什么？",
    opts: ["We Care", "MATL TU", "One Microsoft"],
    answer: "We Care"
  },
  {
    q: "微软亚太工会的官方邮箱是什么？",
    opts: ["matltuop@microsoft.com", "matltu@microsoft.com", "matltuops@microsoft.com"],
    answer: "matltuop@microsoft.com"
  },
  {
    q: "年度Reignite团队建设是活动还是福利？",
    opts: ["活动", "福利"],
    answer: "活动"
  },
  {
    q: "Fit For Fun参与人数大约是？",
    opts: ["120 人", "425 人", "900 人"],
    answer: "425 人"
  },
  {
    q: "Fit for Fun 活动在第一季度的平均达标率是多少？",
    opts: ["56%", "78%", "96.2%"],
    answer: "96.2%"
  },
  {
    q: "在工会活动中，哪项活动可以带家属？",
    opts: ["Reignite", "Fun Day", "Fit for Fun"],
    answer: "Fun Day"
  },
  {
    q: "2026紫竹羽毛球赛到底叫什么？",
    opts: ["紫竹杯", "微软杯", "闵工杯"],
    answer: "微软杯"
  },
  {
    q: "微软亚太工会是什么时候成立的？",
    opts: ["2015", "2017", "2019"],
    answer: "2015"
   },
  {
    q: "微软亚太工会报销发票抬头是什么？",
    opts: ["微软", "微软亚太科技", "微软亚太科技有限公司工会委员会"],
    answer: "微软亚太科技有限公司工会委员会"
   },
  {
    q: "Fit for Fun中“助力金”合理的用途是？",
    opts: ["个人提现", "团队活动 ", "工资补贴"],
    answer: "团队活动 "
   },
  {
    q: "以下哪项活动是工会的全年活动？",
    opts: ["Fit for Fun", "Fun Day", "亲子工作室"],
    answer: "Fit for Fun"
   },
  {
    q: "微软亚太工会的小程序叫什么名字？",
    opts: ["数智工会", "MATLTU", "Matl Trade Union "],
    answer: "MATLTU"
   },
  {
    q: "微软亚太工会的上级工会是什么？",
    opts: ["上海紫竹高新技术产业开发区总工会", "上海市总工会", "闵行区总工会 "],
    answer: "上海紫竹高新技术产业开发区总工会"
   },
  {
    q: "工会的节日礼为什么不可以发购物卡？",
    opts: ["容易丢失", "属于“类现金”等明令禁止选项", "发放流程复杂"],
    answer: "属于“类现金”等明令禁止选项"
     },
  {
    q: "通过什么方式可以登录微软亚太工会微信小程序？",
    opts: ["手机号登录", "微软邮箱 + 验证码 ", "微信授权登录"],
    answer: "微软邮箱 + 验证码 "
  },
  {
    q: "目前还不支持在微软亚太工会小程序上进行哪项操作？",
    opts: ["提交福利报销申请", "进行运动打卡记录", "领取节日礼"],
    answer: "领取节日礼"
   },
  {
    q: "微软亚太工会今年是第几次参加 Teams Fair？",
    opts: ["第一次", "第二次", "第三次"],
    answer: "第二次"
  }
];

let running = false;
let rafId = null;
let slowTimer = null;
let lastTick = 0;
let currentQIdx = -1;
let answered = false;
const FAST_SPEED = 80;   // ms per tick
let correctCount = 0;
let remainingQuestions = [];
let startTime = null;  // track unanswered questions
let answeredCount = 0;
let currentShuffledOpts = [];
let resetId = 0;  // incremented on every reset to invalidate stale star callbacks
let sinceTimerInterval = null;  // interval for "time since completion" display

function clearSinceTimer() {
  if (sinceTimerInterval) { clearInterval(sinceTimerInterval); sinceTimerInterval = null; }
}

function shuffleArray(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    const tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function resetRemaining() {
  const count = Math.min(TOTAL_QUESTIONS, questions.length);
  const allIndices = questions.map(function(_, i) { return i; });
  const shuffled = shuffleArray(allIndices);
  remainingQuestions = shuffled.slice(0, count);
}
resetRemaining();

const card     = document.getElementById('card');
const qContent = document.getElementById('qContent');
const readyTxt = document.getElementById('readyText');
let qNumber  = document.getElementById('qNumber');
let qText    = document.getElementById('qText');
let qOptions = document.getElementById('qOptions');
const mainBtn  = document.getElementById('mainBtn');
let answerArea = document.getElementById('answerArea');
let answerResult = document.getElementById('answerResult');
const starsBar = document.getElementById('starsBar');

// Init stars bar
const totalRound = Math.min(TOTAL_QUESTIONS, questions.length);
for (let i = 0; i < totalRound; i++) {
  const s = document.createElement('span');
  s.className = 'star';
  s.textContent = '⭐';
  starsBar.appendChild(s);
}

function showQuestion(idx, isRolling) {
  readyTxt.style.display = 'none';
  qContent.style.display = 'block';
  qNumber.textContent  = '第 ' + (answeredCount + 1) + ' / ' + Math.min(TOTAL_QUESTIONS, questions.length) + ' 题';
  qText.textContent    = questions[idx].q;
  const labels = ['A', 'B', 'C', 'D'];
  qOptions.textContent = '';
  if (isRolling) {
    // Render non-interactive button-like options matching the final answer style
    answerArea.innerHTML = '';
    questions[idx].opts.forEach(function(o, i) {
      var div = document.createElement('div');
      div.className = 'ans-btn rolling-opt';
      var labelSpan = document.createElement('span');
      labelSpan.className = 'opt-label';
      labelSpan.textContent = labels[i] + '.';
      var textSpan = document.createElement('span');
      textSpan.className = 'opt-text';
      textSpan.textContent = o;
      div.appendChild(labelSpan);
      div.appendChild(textSpan);
      answerArea.appendChild(div);
    });
    answerArea.style.display = 'flex';
  } else {
    currentShuffledOpts = shuffleArray(questions[idx].opts);
    answerArea.style.display = 'none';
    answerArea.innerHTML = '';
  }
  currentQIdx = idx;
  answerResult.textContent = '';
  answerResult.className = 'answer-result';
  answered = false;
}

function randomTick() {
  // Only pick from remaining unanswered questions
  if (remainingQuestions.length === 0) return;
  const pick = remainingQuestions[Math.floor(Math.random() * remainingQuestions.length)];
  showQuestion(pick, true);
}

function fastLoop(ts) {
  if (!running) return;
  if (ts - lastTick >= FAST_SPEED) {
    randomTick();
    lastTick = ts;
  }
  rafId = requestAnimationFrame(fastLoop);
}

function setMainBtnDisabled(disabled) {
  mainBtn.disabled = disabled;
  card.classList.toggle('clickable', !disabled);
}

function handleCardClick() {
  if (mainBtn.disabled) return;
  toggle();
}

function toggle() {
  // Check if all questions answered
  if (remainingQuestions.length === 0) {
    clearSinceTimer();
    resetId++;
    resetRemaining();
    correctCount = 0;
    answeredCount = 0;
    // Reset stars
    starsBar.querySelectorAll('.star').forEach(function(s) { s.classList.remove('lit'); });
    qContent.style.display = 'none';
    answerArea.innerHTML = '';
    answerArea.style.display = 'none';
    answerResult.textContent = '';
    answerResult.className = 'answer-result';
    card.classList.remove('highlight');
    mainBtn.textContent = '开 始';
    mainBtn.classList.remove('stop');
    startTime = null;
    // Fall through to immediately start rolling
  }

  if (!running) {
    // START — show Ready Go countdown then first question
    running = true;
    if (!startTime) startTime = Date.now();
    card.classList.remove('highlight');
    clearConfetti();
    setMainBtnDisabled(true);
    qContent.style.display = 'none';
    readyTxt.style.display = 'block';

    var steps = ['Ready', 'Go!'];
    var stepIdx = 0;
    function showStep() {
      readyTxt.innerHTML = '<div class="ready-go-text">' + steps[stepIdx] + '</div>';
      stepIdx++;
      if (stepIdx < steps.length) {
        setTimeout(showStep, 800);
      } else {
        // After Go!, show circular 3-2-1 countdown
        setTimeout(function() {
          var count = 3;
          var circleHTML = '<div class="circle-countdown">'
            + '<div class="circle-countdown-ring">'
            + '<svg viewBox="0 0 140 140">'
            + '<defs><linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">'
            + '<stop offset="0%" stop-color="#0078d4"/>'
            + '<stop offset="100%" stop-color="#50e6ff"/>'
            + '</linearGradient></defs>'
            + '<circle class="ring-bg" cx="70" cy="70" r="65"/>'
            + '<circle class="ring-fg" cx="70" cy="70" r="65"/>'
            + '</svg>'
            + '<div class="circle-countdown-number">' + count + '</div>'
            + '</div>'
            + '<div class="countdown-sub">即将开始...</div>'
            + '</div>';
          readyTxt.innerHTML = circleHTML;
          requestAnimationFrame(function() {
            var fg = readyTxt.querySelector('.ring-fg');
            if (fg) fg.classList.add('animate');
          });

          var interval = setInterval(function() {
            count--;
            if (count <= 0) {
              clearInterval(interval);
              running = false;
              readyTxt.style.display = 'none';
              var pick = remainingQuestions[Math.floor(Math.random() * remainingQuestions.length)];
              showQuestion(pick, false);
              card.classList.add('highlight');
              showAnswerUI();
            } else {
              readyTxt.querySelector('.circle-countdown-number').textContent = count;
            }
          }, 1000);
        }, 800);
      }
    }
    showStep();
  }
}

// ===== Answer UI =====
function showAnswerUI() {
  if (currentQIdx < 0) return;
  const q = questions[currentQIdx];
  answerArea.innerHTML = '';
  answerResult.textContent = '';
  answerResult.className = 'answer-result';
  answered = false;

  const labels = ['A', 'B', 'C', 'D'];
  currentShuffledOpts.forEach(function(opt, i) {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.dataset.opt = opt;
    const labelSpan = document.createElement('span');
    labelSpan.className = 'opt-label';
    labelSpan.textContent = labels[i] + '.';
    const textSpan = document.createElement('span');
    textSpan.className = 'opt-text';
    textSpan.textContent = opt;
    btn.appendChild(labelSpan);
    btn.appendChild(textSpan);
    btn.onclick = function(e) {
      e.stopPropagation();
      if (answered) return;
      const isCorrect = opt === q.answer;
      checkAnswer(isCorrect, currentQIdx);
      answerArea.querySelectorAll('.ans-btn').forEach(function(b) {
        b.style.pointerEvents = 'none';
        if (b.dataset.opt === q.answer) {
          b.classList.add('correct');
        } else if (b === btn && !isCorrect) {
          b.classList.add('wrong');
        }
      });
    };
    answerArea.appendChild(btn);
  });
  answerArea.style.display = 'flex';
}

function checkAnswer(isCorrect, qIdx) {
  answered = true;
  // Remove from remaining regardless of correct/wrong
  const ri = remainingQuestions.indexOf(qIdx);
  if (ri > -1) remainingQuestions.splice(ri, 1);
  answeredCount++;

  if (isCorrect) {
    answerResult.textContent = '✅ 回答正确！';
    answerResult.className = 'answer-result correct';
    correctCount++;
    var starEls = starsBar.querySelectorAll('.star');
    var targetStarIdx = answeredCount - 1;
    if (targetStarIdx < starEls.length) {
      flyStarToTarget(starEls[targetStarIdx], (function(idx, els, rid) {
        return function() { if (resetId === rid) els[idx].classList.add('lit'); };
      })(targetStarIdx, starEls, resetId));
    }
    launchConfetti();
    if (remainingQuestions.length === 0) {
      // All done — show completion page after a short delay
      var elapsed = Math.round((Date.now() - startTime) / 1000);
      var finishTime = new Date();
      setTimeout(function() {
        showCompletionPage(correctCount, Math.min(TOTAL_QUESTIONS, questions.length), elapsed, finishTime);
      }, 1200);
    } else {
      // Show countdown then next question
      setTimeout(function() {
        clearConfetti();
        card.classList.remove('highlight');
        showCountdown(3, function() {
          var pick = remainingQuestions[Math.floor(Math.random() * remainingQuestions.length)];
          showQuestion(pick, false);
          card.classList.add('highlight');
          setMainBtnDisabled(true);
          showAnswerUI();
        });
      }, 1000);
    }
  } else {
    answerResult.textContent = '❌ 回答错误！';
    answerResult.className = 'answer-result wrong';
    // Show fail results page after a short delay
    var elapsed = Math.round((Date.now() - startTime) / 1000);
    var finishTime = new Date();
    setTimeout(function() {
      showCompletionPage(correctCount, Math.min(TOTAL_QUESTIONS, questions.length), elapsed, finishTime);
    }, 1200);
  }
}

function showCountdown(seconds, onDone) {
  // Clear card content and show circular countdown
  qContent.style.display = 'none';
  readyTxt.style.display = 'block';
  answerArea.style.display = 'none';
  answerArea.innerHTML = '';
  answerResult.textContent = '';
  answerResult.className = 'answer-result';
  setMainBtnDisabled(true);

  var count = seconds;
  function renderCircle(n) {
    return '<div class="circle-countdown">'
      + '<div class="circle-countdown-ring">'
      + '<svg viewBox="0 0 140 140">'
      + '<defs><linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">'
      + '<stop offset="0%" stop-color="#0078d4"/>'
      + '<stop offset="100%" stop-color="#50e6ff"/>'
      + '</linearGradient></defs>'
      + '<circle class="ring-bg" cx="70" cy="70" r="65"/>'
      + '<circle class="ring-fg" cx="70" cy="70" r="65"/>'
      + '</svg>'
      + '<div class="circle-countdown-number">' + n + '</div>'
      + '</div>'
      + '<div class="countdown-sub">准备下一题...</div>'
      + '</div>';
  }

  readyTxt.innerHTML = renderCircle(count);
  // Trigger animation on next frame
  requestAnimationFrame(function() {
    var fg = readyTxt.querySelector('.ring-fg');
    if (fg) fg.classList.add('animate');
  });

  var interval = setInterval(function() {
    count--;
    if (count <= 0) {
      clearInterval(interval);
      readyTxt.style.display = 'none';
      onDone();
    } else {
      readyTxt.querySelector('.circle-countdown-number').textContent = count;
    }
  }, 666);
}

function showCompletionPage(correct, total, elapsedSecs, finishTime) {
  // Hide normal quiz UI
  qContent.style.display = 'none';
  readyTxt.style.display = 'none';
  answerArea.style.display = 'none';
  answerArea.innerHTML = '';
  answerResult.textContent = '';
  answerResult.className = 'answer-result';
  card.classList.remove('highlight');
  setMainBtnDisabled(true);

  // Build time strings
  var mins = Math.floor(elapsedSecs / 60);
  var secs = elapsedSecs % 60;
  var timeStr = mins > 0 ? (mins + '分' + secs + '秒') : (secs + '秒');
  var isPerfect = correct === total;

  // Create completion page inside qContent
  var html = '<div class="completion-page">';
  if (isPerfect) {
    // All correct — victory screen
    html += '<div class="trophy">🎮</div>';
    html += '<div class="result-title">恭喜通关！</div>';
    html += '<div class="result-subtitle">LEVEL MAX</div>';
    html += '<div class="stat-row">';
    html += '<div class="stat-item"><div class="stat-value perfect">' + timeStr + '</div><div class="stat-label">通关用时</div></div>';
    html += '</div>';
    html += '<div class="since-timer" id="sinceTimer">距完成已过：0秒</div>';
    html += '<div class="claim-hint">请向工会工作人员展示此页面领取奖品</div>';
  } else {
    // Wrong answer — fail screen with stats + restart
    var trophy = correct > 0 ? '😢' : '💪';
    html += '<div class="trophy">' + trophy + '</div>';
    html += '<div class="result-title">挑战失败</div>';
    html += '<div class="stat-row">';
    html += '<div class="stat-item"><div class="stat-value">' + correct + '/' + total + '</div><div class="stat-label">答对题数</div></div>';
    html += '<div class="stat-item"><div class="stat-value">' + timeStr + '</div><div class="stat-label">用时</div></div>';
    html += '</div>';
    html += '<div class="since-timer" id="sinceTimer">距完成已过：0秒</div>';
    html += '<button class="restart-btn" id="restartBtn">🔄 再次挑战</button>';
  }
  html += '</div>';

  qContent.innerHTML = html;
  qContent.style.display = 'block';

  // Launch confetti for perfect score
  if (isPerfect) {
    launchConfetti();
  }

  // Start live timer
  clearSinceTimer();
  var sinceEl = document.getElementById('sinceTimer');
  function updateSince() {
    var diff = Math.floor((Date.now() - finishTime.getTime()) / 1000);
    var sm = Math.floor(diff / 60), ss = diff % 60;
    sinceEl.textContent = '距完成已过：' + (sm > 0 ? sm + '分' : '') + ss + '秒';
  }
  updateSince();
  sinceTimerInterval = setInterval(updateSince, 1000);

  // Restart button (only exists on fail screen)
  var restartEl = document.getElementById('restartBtn');
  if (restartEl) {
    restartEl.onclick = function(e) {
    e.stopPropagation();
    clearSinceTimer();
    clearConfetti();
    resetId++;
    resetRemaining();
    correctCount = 0;
    answeredCount = 0;
    starsBar.querySelectorAll('.star').forEach(function(s) { s.classList.remove('lit'); });
    startTime = null;
    setMainBtnDisabled(false);

    // Restore original qContent structure
    qContent.innerHTML = '<div class="q-number" id="qNumber"></div>'
      + '<div class="q-text" id="qText"></div>'
      + '<div class="q-options" id="qOptions"></div>'
      + '<div class="answer-area" id="answerArea" style="display:none;"></div>'
      + '<div class="answer-result" id="answerResult"></div>';
    qContent.style.display = 'none';

    // Re-cache DOM references
    qNumber = document.getElementById('qNumber');
    qText = document.getElementById('qText');
    qOptions = document.getElementById('qOptions');
    answerArea = document.getElementById('answerArea');
    answerResult = document.getElementById('answerResult');

    readyTxt.style.display = 'block';
    readyTxt.textContent = '点击开始抽题 🎯';
    card.classList.remove('highlight');
  };
  }
}

function updateStars() {
  // Light stars from left to right based on correctCount
  const starEls = starsBar.querySelectorAll('.star');
  for (let i = 0; i < correctCount && i < starEls.length; i++) {
    starEls[i].classList.add('lit');
  }
}

// ===== Floating emoji bubbles =====
const emojis = ['🌟','🎈','🎀','🎊','💡','🏆','👻','🎯','🎵','🌈','✨','🎁'];
function spawnBubble() {
  const el = document.createElement('div');
  el.className = 'bubble';
  const inner = document.createElement('span');
  inner.className = 'bubble-inner';
  inner.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.appendChild(inner);
  el.style.left = Math.random() * 100 + 'vw';
  const dur = (8 + Math.random() * 12) + 's';
  el.style.animationDuration = dur;
  el.style.setProperty('--rot-dur', dur);
  el.style.fontSize = (1.4 + Math.random() * 1.6) + 'rem';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
setInterval(spawnBubble, 300);
for (let i = 0; i < 6; i++) setTimeout(spawnBubble, i * 300);
// ===== Bubble hover tracking (bypasses z-index via getBoundingClientRect) =====
let hoveredBubble = null;
document.addEventListener('mousemove', function(e) {
  const bubbles = document.querySelectorAll('.bubble');
  let found = null;
  for (const b of bubbles) {
    const r = b.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right &&
        e.clientY >= r.top  && e.clientY <= r.bottom) {
      found = b;
      break;
    }
  }
  if (found !== hoveredBubble) {
    if (hoveredBubble) {
      hoveredBubble.classList.remove('bubble-hover');
      const prevInner = hoveredBubble.querySelector('.bubble-inner');
      if (prevInner) {
        const dur = hoveredBubble.style.getPropertyValue('--rot-dur');
        prevInner.style.animation = `floatUpRotate ${dur} linear infinite`;
      }
    }
    hoveredBubble = found;
    if (hoveredBubble) {
      hoveredBubble.classList.add('bubble-hover');
      const inner = hoveredBubble.querySelector('.bubble-inner');
      if (inner) {
        const dur = hoveredBubble.style.getPropertyValue('--rot-dur');
        const halfDur = (parseFloat(dur) / 2) + 's';
        inner.style.animation = `floatUpRotate ${halfDur} linear infinite`;
      }
    }
  }
});
document.addEventListener('mouseleave', function() {
  if (hoveredBubble) {
    hoveredBubble.classList.remove('bubble-hover');
    hoveredBubble = null;
  }
});
// ===== Confetti =====
const confettiCanvas = document.getElementById('confetti');
const ctx = confettiCanvas.getContext('2d');
let particles = [];
let confettiAnim = null;

function resizeCanvas() {
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function flyStarToTarget(targetEl, onDone) {
  var flyEl = document.createElement('div');
  flyEl.className = 'flying-star';
  flyEl.textContent = '⭐';
  document.body.appendChild(flyEl);

  // Measure actual rendered size after adding to DOM
  var elRect = flyEl.getBoundingClientRect();
  var elW = elRect.width  || 720;
  var elH = elRect.height || 720;

  var startLeft = (window.innerWidth  - elW) / 2;
  var startTop  = (window.innerHeight - elH) / 2;
  flyEl.style.left = startLeft + 'px';
  flyEl.style.top  = startTop  + 'px';

  // Target: center of the destination star element
  var targetRect = targetEl.getBoundingClientRect();
  var endX = (targetRect.left + targetRect.width  / 2) - (startLeft + elW / 2);
  var endY = (targetRect.top  + targetRect.height / 2) - (startTop  + elH  / 2);

  if (!flyEl.animate) { flyEl.remove(); onDone(); return; }

  var anim = flyEl.animate([
    { transform: 'translate(0,0) scale(1) rotate(0deg)',                                             opacity: 0 },
    { transform: 'translate(0,0) scale(1) rotate(0deg)',                                             opacity: 1,   offset: 0.08 },
    { transform: 'translate(' + endX + 'px,' + endY + 'px) scale(0.02) rotate(720deg)', opacity: 0.9 }
  ], { duration: 780, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)', fill: 'forwards' });

  anim.onfinish = function() { flyEl.remove(); onDone(); };
}

function launchConfetti() {
  particles = [];
  const colors = ['#0078d4','#50e6ff','#f39c12','#e74c3c','#2ecc71','#9b59b6','#ff6f61','#ffd700'];
  for (let i = 0; i < 150; i++) {
    particles.push({
      x: Math.random() * confettiCanvas.width,
      y: Math.random() * confettiCanvas.height * 0.5 - confettiCanvas.height * 0.2,
      w: 6 + Math.random() * 6,
      h: 10 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 10,
      alpha: 1
    });
  }
  if (!confettiAnim) drawConfetti();
}

function clearConfetti() {
  particles = [];
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
}

function drawConfetti() {
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let alive = false;
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.rot += p.rv;
    p.alpha -= 0.004;
    if (p.alpha <= 0) return;
    alive = true;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  if (alive) {
    confettiAnim = requestAnimationFrame(drawConfetti);
  } else {
    confettiAnim = null;
  }
}
