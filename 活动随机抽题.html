<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微软亚太工会 - Teams Fair随机抽题</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d7e9f7 100%);
    overflow: hidden;
    position: relative;
  }

  /* ---- floating cartoon decorations ---- */
  .bubble {
    position: fixed;
    font-size: 2.2rem;
    opacity: .45;
    animation: floatUp linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(360deg); }
  }

  /* ---- clouds ---- */
  .cloud {
    position: fixed;
    width: 160px; height: 60px;
    background: rgba(255,255,255,.55);
    border-radius: 60px;
    pointer-events: none;
    z-index: 0;
    animation: driftCloud linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,.55);
    border-radius: 50%;
  }
  .cloud::before { width: 70px; height: 70px; top: -30px; left: 25px; }
  .cloud::after  { width: 90px; height: 90px; top: -40px; left: 55px; }
  @keyframes driftCloud {
    0%   { transform: translateX(-200px); }
    100% { transform: translateX(110vw); }
  }

  /* ---- header ---- */
  .header {
    position: relative;
    z-index: 1;
    margin-top: 36px;
    text-align: center;
  }
  .header h1 {
    font-size: 2.6rem;
    font-weight: 800;
    background: linear-gradient(90deg, #0078d4, #50e6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 6px;
    text-shadow: none;
  }
  .header .sub {
    font-size: 1rem;
    color: #555;
    margin-top: 6px;
    letter-spacing: 3px;
  }

  /* ---- question card ---- */
  .card-wrapper {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 20px;
  }
  .card {
    width: 720px;
    max-width: 92vw;
    min-height: 220px;
    background: rgba(255,255,255,.88);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(0,120,212,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 48px;
    transition: box-shadow .4s, transform .4s, background .4s;
    text-align: center;
  }
  .card.highlight {
    background: rgba(255,255,255,.97);
    box-shadow: 0 0 0 6px #0078d4, 0 0 60px rgba(0,120,212,.35);
    transform: scale(1.04);
    animation: pulse 1s ease-in-out 3;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 6px #0078d4, 0 0 60px rgba(0,120,212,.35); }
    50%      { box-shadow: 0 0 0 10px #50e6ff, 0 0 90px rgba(80,230,255,.45); }
  }
  .card .q-number {
    font-size: 1rem;
    color: #0078d4;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .card .q-text {
    font-size: 1.45rem;
    font-weight: 700;
    color: #222;
    line-height: 1.7;
    margin-bottom: 14px;
  }
  .card .q-options {
    font-size: 1.15rem;
    color: #444;
    line-height: 1.9;
  }
  .card .ready-text {
    font-size: 1.6rem;
    color: #999;
    letter-spacing: 4px;
  }


  /* ---- answer area ---- */
  .answer-area {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
  }
  .answer-area .ans-btn {
    padding: 10px 28px;
    font-size: 1.1rem;
    font-weight: 700;
    border: 2px solid #0078d4;
    border-radius: 12px;
    background: #fff;
    color: #0078d4;
    cursor: pointer;
    transition: all .2s;
  }
  .answer-area .ans-btn:hover {
    background: #e8f4fd;
    transform: translateY(-1px);
  }
  .answer-area .ans-btn.correct {
    background: #2ecc71;
    color: #fff;
    border-color: #2ecc71;
    animation: correctPop .4s ease;
  }
  .answer-area .ans-btn.wrong {
    background: #e74c3c;
    color: #fff;
    border-color: #e74c3c;
    animation: shake .4s ease;
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .answer-area .ans-input {
    padding: 10px 20px;
    font-size: 1.1rem;
    border: 2px solid #0078d4;
    border-radius: 12px;
    outline: none;
    width: 280px;
    text-align: center;
  }
  .answer-area .ans-submit {
    padding: 10px 24px;
    font-size: 1.1rem;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    background: #0078d4;
    color: #fff;
    cursor: pointer;
  }
  .answer-result {
    margin-top: 14px;
    font-size: 1.2rem;
    font-weight: 700;
    min-height: 1.5em;
  }
  .answer-result.correct { color: #2ecc71; }
  .answer-result.wrong { color: #e74c3c; }

  /* ---- stars ---- */
  .stars-bar {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .stars-bar .star {
    font-size: 2rem;
    opacity: 0.2;
    transition: opacity .4s, transform .4s;
    filter: grayscale(1);
  }
  .stars-bar .star.lit {
    opacity: 1;
    filter: grayscale(0);
    animation: starPop .5s ease;
  }
  @keyframes starPop {
    0% { transform: scale(0.5) rotate(-20deg); }
    60% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .logo-options {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-top: 10px;
  }
  .logo-options div {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .logo-options span {
    font-weight: 700;
    font-size: 1.1rem;
    color: #0078d4;
  }
  .logo-options img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    border-radius: 10px;
    border: 2px solid #eee;
    background: #fff;
    padding: 4px;
  }

  /* ---- button ---- */
  .btn-area {
    position: relative;
    z-index: 1;
    margin-bottom: 48px;
  }
  .btn {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: 6px;
    padding: 16px 64px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #0078d4, #50e6ff);
    box-shadow: 0 6px 24px rgba(0,120,212,.35);
    transition: transform .2s, box-shadow .2s;
    outline: none;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 32px rgba(0,120,212,.45);
  }
  .btn:active {
    transform: translateY(1px);
  }
  .btn.stop {
    background: linear-gradient(135deg, #e74c3c, #f39c12);
    box-shadow: 0 6px 24px rgba(231,76,60,.35);
  }

  /* ---- confetti canvas ---- */
  #confetti {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }
</style>
</head>

const answerResult = document.getElementById('answerResult');
const starsBar = document.getElementById('starsBar');

// Init stars bar
for (let i = 0; i < questions.length; i++) {
  const s = document.createElement('span');
  s.className = 'star';
  s.textContent = '⭐';
  starsBar.appendChild(s);
}

function showQuestion(idx, isRolling) {
  readyTxt.style.display = 'none';
  qContent.style.display = 'block';
  qNumber.textContent  = '第 ' + (answeredCount + 1) + ' / ' + questions.length + ' 题';
  qText.textContent    = questions[idx].q;
  if (questions[idx].isHtml) {
    // During rolling, skip heavy base64 image rendering to avoid lag
    if (isRolling) {
      qOptions.textContent = '[ 图片选项 ]';
    } else {
      qOptions.innerHTML = questions[idx].opts;
    }
  } else {
    qOptions.textContent = questions[idx].opts;
  }
  currentQIdx = idx;
  // Hide answer UI during rolling
  answerArea.style.display = 'none';
  answerArea.innerHTML = '';
  answerResult.textContent = '';
  answerResult.className = 'answer-result';
  answered = false;
}

function randomTick() {
  // Only pick from remaining unanswered questions
  if (remainingQuestions.length === 0) return;
  const pick = remainingQuestions[Math.floor(Math.random() * remainingQuestions.length)];
  showQuestion(pick, true);
}

function fastLoop(ts) {
  if (!running) return;
  if (ts - lastTick >= FAST_SPEED) {
    randomTick();
    lastTick = ts;
  }
  rafId = requestAnimationFrame(fastLoop);
}

function toggle() {
  // Check if all questions answered
  if (remainingQuestions.length === 0) {
    resetRemaining();
    correctCount = 0;
    answeredCount = 0;
    // Reset stars
    starsBar.querySelectorAll('.star').forEach(function(s) { s.classList.remove('lit'); });
    readyTxt.style.display = 'block';
    readyTxt.textContent = '所有题目已答完，重新开始！🎯';
    qContent.style.display = 'none';
    card.classList.remove('highlight');
    mainBtn.textContent = '开 始';
    mainBtn.classList.remove('stop');
    startTime = null;
    return;
  }

  if (!running) {
    // START — ultra fast rolling via requestAnimationFrame
    running = true;
    if (!startTime) startTime = Date.now();
    card.classList.remove('highlight');
    mainBtn.textContent = '停 止';
    mainBtn.classList.add('stop');
    clearConfetti();

    lastTick = 0;
    rafId = requestAnimationFrame(fastLoop);
  } else {
    // STOP — immediately stop and show result
    running = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    randomTick();
    // Re-render final question with full content (including HTML/images)
    showQuestion(currentQIdx, false);
    card.classList.add('highlight');
    mainBtn.textContent = '...';
    mainBtn.classList.remove('stop');
    mainBtn.disabled = true;
    launchConfetti();
    showAnswerUI();
  }
}

// ===== Answer UI =====
function showAnswerUI() {
  if (currentQIdx < 0) return;
  const q = questions[currentQIdx];
  answerArea.innerHTML = '';
  answerResult.textContent = '';
  answerResult.className = 'answer-result';
  answered = false;

  if (q.inputMode) {
    // Free text input
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'ans-input';
    input.placeholder = '请输入答案...';
    const submitBtn = document.createElement('button');
    submitBtn.className = 'ans-submit';
    submitBtn.textContent = '提交';
    submitBtn.onclick = function() {
      if (answered) return;
      const val = input.value.trim().toLowerCase();
      const correct = q.answer.toLowerCase();
      checkAnswer(val === correct, currentQIdx);
      if (val === correct) {
        input.style.borderColor = '#2ecc71';
        input.style.background = '#eafaf1';
      } else {
        input.style.borderColor = '#e74c3c';
        input.style.background = '#fdecea';
      }
    };
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') submitBtn.click();
    });
    answerArea.appendChild(input);
    answerArea.appendChild(submitBtn);
  } else if (q.choices) {
    // Multiple choice buttons
    q.choices.forEach(function(ch) {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = ch;
      btn.onclick = function() {
        if (answered) return;
        const isCorrect = ch === q.answer;
        checkAnswer(isCorrect, currentQIdx);
        // Highlight all buttons
        answerArea.querySelectorAll('.ans-btn').forEach(function(b) {
          b.style.pointerEvents = 'none';
          if (b.textContent === q.answer) {
            b.classList.add('correct');
          } else if (b === btn && !isCorrect) {
            b.classList.add('wrong');
          }
        });
      };
      answerArea.appendChild(btn);
    });
  }
  answerArea.style.display = 'flex';
}

function checkAnswer(isCorrect, qIdx) {
  answered = true;
  // Remove from remaining regardless of correct/wrong
  const ri = remainingQuestions.indexOf(qIdx);
  if (ri > -1) remainingQuestions.splice(ri, 1);
  answeredCount++;

  if (isCorrect) {
    answerResult.textContent = '✅ 回答正确！';
    answerResult.className = 'answer-result correct';
    correctCount++;
    // Light the star at current answeredCount position (1-based, already incremented)
    var starEls = starsBar.querySelectorAll('.star');
    if (answeredCount - 1 < starEls.length) {
      starEls[answeredCount - 1].classList.add('lit');
    }
  } else {
    answerResult.textContent = '❌ 回答错误！正确答案是：' + questions[qIdx].answer;
    answerResult.className = 'answer-result wrong';
  }

  // Auto proceed to next question after a short delay
  setTimeout(function() {
    if (remainingQuestions.length === 0) {
      // All done - show time
      var elapsed = Math.round((Date.now() - startTime) / 1000);
      var mins = Math.floor(elapsed / 60);
      var secs = elapsed % 60;
      var timeStr = mins > 0 ? (mins + '分' + secs + '秒') : (secs + '秒');
      mainBtn.disabled = false;
      mainBtn.textContent = '🎉 完成！';
      answerResult.textContent += '  —  所有题目已答完！用时 ' + timeStr + '，答对 ' + correctCount + '/' + questions.length + ' 题\n完成时间：' + new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai', hour12: false});
    } else {
      mainBtn.disabled = false;
      mainBtn.textContent = '下一题';
      mainBtn.classList.remove('stop');
    }
  }, 1500);
}

function updateStars() {
  // Light stars from left to right based on correctCount
  const starEls = starsBar.querySelectorAll('.star');
  for (let i = 0; i < correctCount && i < starEls.length; i++) {
    starEls[i].classList.add('lit');
  }
}

// ===== Floating emoji bubbles =====
const emojis = ['🌟','🎈','🎀','🎊','💡','🏆','⭐','🎯','🎵','🌈','✨','🎁'];
function spawnBubble() {
  const el = document.createElement('div');
  el.className = 'bubble';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.animationDuration = (8 + Math.random() * 12) + 's';
  el.style.fontSize = (1.4 + Math.random() * 1.6) + 'rem';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
setInterval(spawnBubble, 1800);
for (let i = 0; i < 6; i++) setTimeout(spawnBubble, i * 300);

// ===== Confetti =====
const confettiCanvas = document.getElementById('confetti');
const ctx = confettiCanvas.getContext('2d');
let particles = [];
let confettiAnim = null;

function resizeCanvas() {
  confettiCanvas.width  = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function launchConfetti() {
  particles = [];
  const colors = ['#0078d4','#50e6ff','#f39c12','#e74c3c','#2ecc71','#9b59b6','#ff6f61','#ffd700'];
  for (let i = 0; i < 150; i++) {
    particles.push({
      x: Math.random() * confettiCanvas.width,
      y: Math.random() * confettiCanvas.height * 0.5 - confettiCanvas.height * 0.2,
      w: 6 + Math.random() * 6,
      h: 10 + Math.random() * 8,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * 360,
      rv: (Math.random() - 0.5) * 10,
      alpha: 1
    });
  }
  if (!confettiAnim) drawConfetti();
}

function clearConfetti() {
  particles = [];
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
}

function drawConfetti() {
  ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  let alive = false;
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.rot += p.rv;
    p.alpha -= 0.004;
    if (p.alpha <= 0) return;
    alive = true;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  if (alive) {
    confettiAnim = requestAnimationFrame(drawConfetti);
  } else {
    confettiAnim = null;
  }
}
</script>
